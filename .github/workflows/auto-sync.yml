name: auto-sync

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 19 * * *" # 每天 UTC 时间 19:00 (北京时间 3:00~4:15) 触发一次

  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  job-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5
      # Step 2: 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.GIT_NAME }}"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
      # Step 3: 同步至 HuggingFace
      - name: Sync Files to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://oauth2:$HF_TOKEN@huggingface.co/spaces/monetjoe/pianos ../hf_repo
          rm -rf ./.git* ./LICENSE
          cp -rf ../hf_repo/README.md ../hf_repo/requirements.txt ../hf_repo/.git ./
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git add .
            git commit -m "Auto sync at $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "Files are the same, no changes."
          fi
      # Step 4: 同步至 ModelScope
      - name: Sync Files to ModelScope
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          git clone https://oauth2:$MS_TOKEN@www.modelscope.cn/studios/ccmusic-database/pianos.git ../ms_repo
          rm -rf ./.git ./README.md
          cp -rf ../ms_repo/requirements.txt ../ms_repo/.git ./
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git add .
            git commit -m "Auto sync at $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            wget --header="Authorization: token $GIT_TOKEN" $BASE_URL/restart.py
            pip install modelscope
            python ./restart.py --token $MS_TOKEN --repo ccmusic-database/pianos
          else
            echo "Files are the same, no changes."
          fi

  job-on-schedule:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # Step 1: 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.GIT_NAME }}"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
      # Step 2: 更新 HF SDK
      - name: Check HuggingFace SDK Update
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MD_URL: ${{ vars.MD_URL }}
        run: |
          GIT_LFS_SKIP_SMUDGE=1 git clone https://oauth2:$HF_TOKEN@huggingface.co/spaces/monetjoe/pianos ./hf_repo
          cd ./hf_repo
          LATEST_VER=$(curl -s "$MD_URL" | tr -d '\n' | grep -oP '(?<=<code>).*?(?=</code>)')
          if [ -n "$LATEST_VER" ]; then
            sed -i "s/^\(sdk_version: \)[0-9.]*/\1$LATEST_VER/" README.md
            if [ -n "$(git status --porcelain)" ]; then
              echo "Files are different, committing changes..."
              git add .
              git commit -m "Update SDK at $(date '+%Y-%m-%d %H:%M:%S')"
              git push
            else
              cd ..
              rm -rf ./hf_repo
              last_commit_ts=$(git log -1 --format=%ct 2>/dev/null)
              now_ts=$(date +%s)
              diff_days=$(((now_ts - last_commit_ts) / 86400))
              if [ $diff_days -gt 58 ]; then
                git commit --allow-empty -m "chore: keep repo active [skip ci]"
                git push origin HEAD:main
              else
                echo "Files are the same, no changes."
              fi
            fi
          else
            echo "Failed to obtain latest sdk version."
          fi
